<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Award Form</title>
</head>
<body>
    <h1>Member Award Form</h1>
    <form>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br>
        <label for="award">Select Award:</label><br>
        <select id="award" name="award">
            <option value="award1">Award 1</option>
            <option value="award2">Award 2</option>
            <option value="award3">Award 3</option>
        </select><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
